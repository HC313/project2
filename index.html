
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>거북목 감지기</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- Optional font preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- MediaPipe Pose: pose.js에서 Pose 객체를 사용하기 위해 필요 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>

<body>
  <header>
    <span class="logo">POSTURE<span class="logo-dot">.</span>AI</span>
    <h1>거북목 감지 시스템</h1>

    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">대기 중</span>
    </div>
  </header>

  <main>
    <section class="camera-section">
      <div class="video-wrapper">
        <!-- app.js에서 id="webcam"을 찾음 -->
        <video id="webcam" autoplay playsinline muted></video>

        <!-- app.js에서 id="overlay"를 찾음 -->
        <canvas id="overlay"></canvas>

        <div class="video-overlay-msg" id="videoMsg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M15 10l4.553-2.069A1 1 0 0121 8.869v6.262a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          </svg>
          <span>카메라를 시작해 자세를 분석하세요</span>
        </div>
      </div>

      <div class="alert-banner" id="alertBanner">
        <span class="icon" id="alertIcon">✓</span>
        <span id="alertMsg">자세가 바릅니다</span>
      </div>

      <div class="controls">
        <!-- app.js에서 id="btn-start", id="btn-stop"을 찾음 -->
        <button class="primary" id="btn-start">카메라 시작</button>
        <button id="btn-stop" disabled>중지</button>

        <!-- 현재 app.js에서는 직접 사용하지 않지만, 추후 데이터 수집용으로 유지 -->
        <button id="collectNormalBtn" disabled title="현재 자세를 normal 데이터로 저장">
          정상 수집
        </button>
        <button id="collectTurtleBtn" disabled title="현재 자세를 turtle_neck 데이터로 저장">
          거북목 수집
        </button>
      </div>
    </section>

    <aside class="side-panel">
      <!-- 자세 점수 -->
      <div class="card">
        <div class="card-title">자세 점수</div>

        <div class="score-display">
          <!-- app.js에서 id="posture-score"를 찾음 -->
          <div class="score-num" id="posture-score">-- / 100</div>
        </div>

        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="scoreBar" style="width: 0%"></div>
        </div>

        <div class="badge-row">
          <!-- app.js에서 id="badge-normal", id="badge-turtle"을 찾음 -->
          <span class="badge loaded" id="badge-normal">Good Posture</span>
          <span class="badge pending" id="badge-turtle">Turtle Neck</span>
        </div>
      </div>

      <!-- Feature 값 -->
      <div class="card">
        <div class="card-title">추출된 특징값 (Features)</div>

        <div class="metric-row">
          <span class="metric-label">귀-어깨 거리 비율</span>
          <span class="metric-value" id="feature-ear-shoulder">--</span>
        </div>

        <div class="metric-row">
          <span class="metric-label">머리 전방 이동 (px)</span>
          <span class="metric-value" id="feature-head-forward">--</span>
        </div>

        <div class="metric-row">
          <span class="metric-label">목 기울기 (°)</span>
          <span class="metric-value" id="feature-neck-angle">--</span>
        </div>

        <div class="metric-row">
          <span class="metric-label">어깨 수평 대칭</span>
          <span class="metric-value" id="feature-shoulder-sym">--</span>
        </div>

        <!-- annotation팀의 pose_ratio와 맞추기 위해 추가 -->
        <div class="metric-row">
          <span class="metric-label">Pose Ratio</span>
          <span class="metric-value" id="feature-pose-ratio">--</span>
        </div>

        <div class="metric-row">
          <span class="metric-label">모델 판정</span>
          <span class="metric-value" id="feature-model-pred">--</span>
        </div>
      </div>

      <!-- Threshold 설정 -->
      <div class="card threshold-section">
        <div class="card-title">임계값 설정</div>

        <label for="th-neck-angle">목 기울기 경고 (°)</label>
        <div class="threshold-row">
          <!-- app.js에서 id="th-neck-angle"을 찾음 -->
          <input
            type="range"
            min="5"
            max="30"
            step="1"
            value="15"
            id="th-neck-angle"
            oninput="document.getElementById('angleVal').textContent = this.value"
          />
          <span class="threshold-val" id="angleVal">15</span>
        </div>

        <label for="th-ear-shoulder">귀-어깨 거리 비율 경고</label>
        <div class="threshold-row">
          <!-- app.js에서 id="th-ear-shoulder"를 찾음 -->
          <input
            type="range"
            min="0.10"
            max="0.60"
            step="0.01"
            value="0.30"
            id="th-ear-shoulder"
            oninput="document.getElementById('distVal').textContent = Number(this.value).toFixed(2)"
          />
          <span class="threshold-val" id="distVal">0.30</span>
        </div>
      </div>

      <!-- 모델 상태 -->
      <div class="card">
        <div class="card-title">모델 상태</div>

        <div class="model-status">
          <div class="model-item">
            <span>MediaPipe Pose</span>
            <!-- app.js에서 id="state-mediapipe"를 찾음 -->
            <span class="badge pending" id="state-mediapipe">대기</span>
          </div>

          <div class="model-item">
            <span>TensorFlow.js</span>
            <!-- app.js에서 id="state-tf"를 찾음 -->
            <span class="badge pending" id="state-tf">미학습</span>
          </div>

          <div class="model-item">
            <span>수집 데이터</span>
            <!-- app.js에서 id="state-data"를 찾음 -->
            <span class="badge pending" id="state-data">미학습 0개</span>
          </div>

          <div class="model-item">
            <span>현재 상태</span>
            <!-- app.js에서 id="model-status"를 찾음 -->
            <span class="badge pending" id="model-status">대기 중</span>
          </div>
        </div>
      </div>

      <!-- 감지 이력 -->
      <div class="card">
        <div class="card-title">감지 이력</div>
        <!-- app.js에서 id="history-list"를 찾음 -->
        <div class="timeline" id="history-list">
          <div class="empty-state">감지 기록 없음</div>
        </div>
      </div>
    </aside>
  </main>

  <script src="./js/posture.js"></script>
  <script src="./js/alert.js"></script>
  <script type="module" src="./js/app.js"></script> 
</body>
</html>
